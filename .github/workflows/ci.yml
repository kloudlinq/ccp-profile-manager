name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Packaging is the step most likely to break silently (vsce manifest
      # rules), so exercise it on every push, not just at release time.
      - run: npm run package:ext
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode-extension/*.vsix
